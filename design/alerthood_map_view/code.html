<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>ALERTHOOD - Map View</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;900&amp;family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>.material-symbols-outlined {
    font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24
    }
.map-bg {
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuBnDMxM2qpH_gJIHZuwRRe-L7Umh3IVgF_mJwLe6WFkjfwYmfHVmxCNIRWaKELEOhm7KqoTpRycA2bv5ZSifOD8kTRDoRc92WF6ztIqE5yY0vd0iSr2_-xldX1ArvSIICMskALa4SAuBJzYgX2o70evch9mc5P-AOBmhYzkiVoSHwsP6DDQ0yJatyBct5-NAjOcZ6QB2pa_FJBHncJlofwmh2zt8cOTkX5RBcZaZRBBRXriaLry1w9OnOwyFLJO5ANYU8YLqCSB4G3o);
    background-size: cover;
    background-position: center;
    filter: grayscale(1) brightness(0.3) contrast(1.2)
    }
.marker-pulse {
    animation: pulse 2s infinite
    }
@keyframes pulse {
    0% {
        transform: scale(1);
        opacity: 1;
        } 70% {
        transform: scale(2.5);
        opacity: 0;
        } 100% {
        transform: scale(1);
        opacity: 0;
        }
    }</style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-secondary-container": "#633700",
                        "error-container": "#93000a",
                        "tertiary-fixed-dim": "#e8b3ff",
                        "inverse-primary": "#c0000a",
                        "on-background": "#e5e2e1",
                        "surface-bright": "#393939",
                        "on-error-container": "#ffdad6",
                        "on-tertiary-container": "#460066",
                        "primary-fixed-dim": "#ffb4aa",
                        "surface-container-high": "#2a2a2a",
                        "background": "#131313",
                        "surface-variant": "#353534",
                        "tertiary-fixed": "#f6d9ff",
                        "tertiary": "#e8b3ff",
                        "surface-container-highest": "#353534",
                        "tertiary-container": "#c567f4",
                        "on-primary": "#690003",
                        "primary-container": "#ff5545",
                        "surface": "#131313",
                        "surface-container": "#201f1f",
                        "error": "#ffb4ab",
                        "primary": "#ffb4aa",
                        "on-secondary": "#4b2800",
                        "secondary-fixed-dim": "#ffb874",
                        "outline": "#ad8883",
                        "secondary-fixed": "#ffdcbf",
                        "surface-container-lowest": "#0e0e0e",
                        "primary-fixed": "#ffdad5",
                        "outline-variant": "#5d3f3b",
                        "on-primary-container": "#5c0002",
                        "surface-dim": "#131313",
                        "on-primary-fixed-variant": "#930005",
                        "on-tertiary": "#510074",
                        "on-tertiary-fixed": "#310048",
                        "secondary": "#ffbc7c",
                        "surface-container-low": "#1c1b1b",
                        "on-secondary-fixed": "#2d1600",
                        "inverse-on-surface": "#313030",
                        "secondary-container": "#fe9400",
                        "on-error": "#690005",
                        "on-secondary-fixed-variant": "#6a3b00",
                        "surface-tint": "#ffb4aa",
                        "on-surface": "#e5e2e1",
                        "on-surface-variant": "#e7bdb7",
                        "on-primary-fixed": "#410001",
                        "inverse-surface": "#e5e2e1",
                        "on-tertiary-fixed-variant": "#7201a2"
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<nav class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-[#131313] border-b-2 border-black shadow-[4px_4px_0px_#000000]">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#FF5545]" style="font-variation-settings: 'FILL' 1;">security</span>
<span class="font-space-grotesk font-black text-2xl uppercase tracking-tighter italic text-[#FF5545]">ALERTHOOD</span>
</div>
<div class="flex items-center gap-4">
<button class="p-2 hover:bg-[#2A2A2A] transition-none active:translate-x-[2px] active:translate-y-[2px] active:shadow-none">
<span class="material-symbols-outlined text-white">notifications</span>
</button>
</div>
</nav>
<!-- Main Content Canvas (Map View) -->
<main class="relative w-full h-screen overflow-hidden pt-16 pb-20">
<!-- Interactive Map Mockup -->
<div class="absolute inset-0 map-bg z-0" data-alt="Dark stylized city street map with high contrast roads and minimal labels for tactical interface look" data-location="Chicago" style=""></div>
<!-- Monitored Area Overlay -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[300px] h-[300px] rounded-full border-4 border-dashed border-primary/30 bg-primary/5 pointer-events-none">
<div class="absolute inset-0 flex items-center justify-center">
<span class="bg-black/60 px-3 py-1 text-[10px] font-bold text-primary tracking-widest uppercase rounded border border-black">Monitored Zone</span>
</div>
</div>
<!-- Custom Markers -->
<!-- Red Dot: Crime (Main St & 5th) -->
<div class="absolute top-[45%] left-[48%] group cursor-pointer">
<div class="relative flex items-center justify-center">
<div class="absolute w-8 h-8 bg-primary-container/40 rounded-full marker-pulse"></div>
<div class="relative w-4 h-4 bg-primary-container border-2 border-black rounded-full shadow-[2px_2px_0px_#000000]"></div>
</div>
</div>
<!-- Orange Dot: Infrastructure (West End) -->
<div class="absolute top-[35%] left-[25%]">
<div class="relative w-4 h-4 bg-secondary-container border-2 border-black rounded-full shadow-[2px_2px_0px_#000000]"></div>
</div>
<!-- Yellow Dot: Natural Disaster (Park Ave) -->
<div class="absolute top-[60%] left-[70%]">
<div class="relative w-4 h-4 bg-yellow-400 border-2 border-black rounded-full shadow-[2px_2px_0px_#000000]"></div>
</div>
<!-- Purple Dot: Public Disturbance (Center Sq) -->
<div class="absolute top-[52%] left-[55%]">
<div class="relative w-4 h-4 bg-tertiary-container border-2 border-black rounded-full shadow-[2px_2px_0px_#000000]"></div>
</div>
<!-- FAB: Add Alert -->
<button class="fixed bottom-24 right-6 w-16 h-16 bg-primary-container border-[3px] border-black shadow-[4px_4px_0px_#000000] active:translate-x-[2px] active:translate-y-[2px] active:shadow-none flex items-center justify-center z-40">
<span class="material-symbols-outlined text-on-primary-container text-4xl font-bold">add</span>
</button>
<!-- Bottom Sheet / Active Alert Card -->
<div class="absolute bottom-4 left-4 right-4 md:left-auto md:right-6 md:w-96 z-40">
<div class="bg-surface-container border-[3px] border-black rounded-xl overflow-hidden shadow-[8px_8px_0px_#000000] relative">
<!-- Impact Bar -->
<div class="absolute left-0 top-0 bottom-0 w-[6px] bg-primary-container"></div>
<div class="p-5 pl-8">
<div class="flex justify-between items-start mb-4">
<div>
<span class="bg-error-container text-on-error-container text-[10px] font-bold tracking-widest uppercase px-3 py-1 rounded-full border border-black mb-2 inline-block">CRIME</span>
<h2 class="font-headline text-xl text-on-surface leading-tight">Suspicious Activity Reported</h2>
<p class="font-label text-xs text-on-surface-variant mt-1">Main St &amp; 5th • 5 mins ago</p>
</div>
<div class="bg-surface-container-high border-2 border-black p-2 flex flex-col items-center">
<span class="text-xs font-bold text-primary">12</span>
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">thumb_up</span>
</div>
</div>
<div class="grid grid-cols-2 gap-4 mb-6">
<div class="bg-surface-container-lowest border-2 border-black p-3">
<label class="text-[10px] font-bold text-on-surface-variant block mb-1 uppercase tracking-tighter">Severity</label>
<div class="w-full h-3 bg-black border border-outline-variant relative">
<div class="absolute inset-y-0 left-0 bg-primary-container" style="width: 75%;"></div>
</div>
<span class="text-xs font-bold mt-1 inline-block">75%</span>
</div>
<div class="bg-surface-container-lowest border-2 border-black p-3">
<label class="text-[10px] font-bold text-on-surface-variant block mb-1 uppercase tracking-tighter">Relevance</label>
<div class="flex items-baseline gap-1">
<span class="text-2xl font-headline text-secondary">87</span>
<span class="text-xs font-bold text-secondary">%</span>
</div>
</div>
</div>
<div class="flex gap-3">
<button class="flex-1 bg-primary-container text-on-primary-container font-headline py-3 border-[3px] border-black shadow-[4px_4px_0px_#000000] active:translate-x-[2px] active:translate-y-[2px] active:shadow-none uppercase text-sm tracking-wider">
                            VIEW DETAILS
                        </button>
<button class="w-14 bg-surface-container-high text-on-surface font-headline border-[3px] border-black shadow-[4px_4px_0px_#000000] active:translate-x-[2px] active:translate-y-[2px] active:shadow-none flex items-center justify-center">
<span class="material-symbols-outlined">share</span>
</button>
</div>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-20 pb-safe bg-[#131313] border-t-2 border-black">
<!-- MAP - ACTIVE -->
<a class="flex flex-col items-center justify-center text-[#FF5545] bg-[#201F1F] py-2 px-4 border-t-4 border-[#FF5545] w-1/3 h-full active:scale-95 transition-none" href="#">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">map</span>
<span class="font-space-grotesk font-bold text-[10px] tracking-widest">MAP</span>
</a>
<!-- FEED - INACTIVE -->
<a class="flex flex-col items-center justify-center text-gray-500 py-2 px-4 w-1/3 h-full hover:text-white active:scale-95 transition-none" href="#">
<span class="material-symbols-outlined mb-1">dynamic_feed</span>
<span class="font-space-grotesk font-bold text-[10px] tracking-widest">FEED</span>
</a>
<!-- PROFILE - INACTIVE -->
<a class="flex flex-col items-center justify-center text-gray-500 py-2 px-4 w-1/3 h-full hover:text-white active:scale-95 transition-none" href="#">
<span class="material-symbols-outlined mb-1">person</span>
<span class="font-space-grotesk font-bold text-[10px] tracking-widest">PROFILE</span>
</a>
</nav>
</body></html>
